// ─── Shape drawing functions ───────────────────────────────────────────────

function drawEyeShape(ctx, shape, x, y, w, h, flipped, rotate180) {
  const cx=x+w/2, cy=y+h/2, rx=w/2, ry=h/2;
  ctx.save();
  ctx.translate(cx,cy);
  if (rotate180) ctx.rotate(Math.PI);
  if (flipped) ctx.scale(-1,1);
  ctx.translate(-cx,-cy);
  ctx.beginPath();
  switch(shape) {
    // ── Realistic ──
    case 'almond':  // pointed inner & outer corners, slight lid arch
      ctx.moveTo(x,cy);
      ctx.bezierCurveTo(x+w*0.12,y+h*0.05, x+w*0.4,y, x+w*0.65,y+h*0.05);
      ctx.bezierCurveTo(x+w*0.85,y+h*0.1, x+w,cy-ry*0.15, x+w,cy);
      ctx.bezierCurveTo(x+w,cy+ry*0.5, x+w*0.85,y+h, x+w*0.6,y+h);
      ctx.bezierCurveTo(x+w*0.3,y+h, x+w*0.1,y+h*0.75, x,cy);
      break;
    case 'round':   // large open circle-ish, slight lid crease
      ctx.ellipse(cx, cy-ry*0.05, rx, ry*0.95, 0, 0, Math.PI*2); break;
    case 'hooded':  // heavy top lid droops low, reducing visible area
      ctx.moveTo(x,cy+ry*0.1);
      ctx.bezierCurveTo(x+w*0.1,cy-ry*0.3, x+w*0.45,y+h*0.15, x+w*0.65,y+h*0.2);
      ctx.bezierCurveTo(x+w*0.85,y+h*0.25, x+w,cy, x+w,cy+ry*0.1);
      ctx.bezierCurveTo(x+w*0.85,y+h*0.85, x+w*0.15,y+h*0.85, x,cy+ry*0.1);
      break;
    case 'monolid': // flat top line, curved bottom — no upper crease visible
      ctx.moveTo(x,cy-ry*0.1);
      ctx.bezierCurveTo(x+w*0.3,cy-ry*0.5, x+w*0.7,cy-ry*0.5, x+w,cy-ry*0.1);
      ctx.bezierCurveTo(x+w,cy+ry*0.6, x,cy+ry*0.6, x,cy-ry*0.1);
      break;
    case 'droopy':  // outer corner falls below centre line
      ctx.moveTo(x,cy-ry*0.1);
      ctx.bezierCurveTo(x+w*0.1,y+h*0.05, x+w*0.7,y+h*0.05, x+w,cy+ry*0.55);
      ctx.bezierCurveTo(x+w*0.85,y+h*0.9, x+w*0.1,y+h*0.9, x,cy-ry*0.1);
      break;
    case 'upturned': // outer corner lifts above centre
      ctx.moveTo(x,cy+ry*0.2);
      ctx.bezierCurveTo(x+w*0.1,cy-ry*0.3, x+w*0.5,y+h*0.05, x+w,y+h*0.05);
      ctx.bezierCurveTo(x+w,y+h*0.05, x+w,cy, x+w,cy-ry*0.35);
      ctx.bezierCurveTo(x+w*0.8,cy+ry*0.6, x+w*0.2,cy+ry*0.7, x,cy+ry*0.2);
      break;
    case 'deep-set': // visible slit — heavy brow shadow on top
      ctx.moveTo(x+w*0.05,cy+ry*0.05);
      ctx.bezierCurveTo(x+w*0.15,cy-ry*0.6, x+w*0.85,cy-ry*0.6, x+w*0.95,cy+ry*0.05);
      ctx.bezierCurveTo(x+w*0.85,cy+ry*0.6, x+w*0.15,cy+ry*0.6, x+w*0.05,cy+ry*0.05);
      break;
    case 'wide-set': // very elongated almond
      ctx.moveTo(x,cy);
      ctx.bezierCurveTo(x+w*0.05,y+h*0.05, x+w*0.4,y, x+w*0.7,y+h*0.08);
      ctx.bezierCurveTo(x+w*0.9,y+h*0.15, x+w,cy, x+w,cy);
      ctx.bezierCurveTo(x+w*0.9,y+h*0.82, x+w*0.5,y+h, x+w*0.2,y+h);
      ctx.bezierCurveTo(x+w*0.05,y+h, x,cy, x,cy);
      break;
    // ── Stylised / anime ──
    case 'cat':  // sharp flat inner corner, arched top, pointed outer
      ctx.moveTo(x,cy+ry*0.1);
      ctx.bezierCurveTo(x+w*0.05,y+h*0.1, x+w*0.4,y, x+w*0.7,y+h*0.05);
      ctx.bezierCurveTo(x+w*0.88,y+h*0.1, x+w,y+h*0.1, x+w,cy-ry*0.2);
      ctx.bezierCurveTo(x+w*0.9,y+h*0.75, x+w*0.15,y+h*0.85, x,cy+ry*0.1);
      break;
    case 'manga-round': // very large teardrop-bottom circle, anime style
      ctx.ellipse(cx, cy+ry*0.08, rx*0.92, ry*0.92, 0, 0, Math.PI*2); break;
    case 'manga-sharp': // wide with sharp outer corner spike
      ctx.moveTo(x+w*0.05,cy);
      ctx.bezierCurveTo(x+w*0.1,y+h*0.05, x+w*0.5,y, x+w*0.82,y+h*0.08);
      ctx.bezierCurveTo(x+w*0.92,y+h*0.12, x+w*1.05,cy*0.3+y*0.7, x+w,cy);
      ctx.bezierCurveTo(x+w*0.88,y+h*0.85, x+w*0.1,y+h, x+w*0.05,cy);
      break;
    case 'tareme': // soft droopy bottom-heavy anime (kind eyes)
      ctx.moveTo(x+w*0.05,cy-ry*0.2);
      ctx.bezierCurveTo(x+w*0.1,y+h*0.08, x+w*0.55,y+h*0.05, x+w*0.85,cy-ry*0.1);
      ctx.bezierCurveTo(x+w*0.95,cy, x+w,cy+ry*0.3, x+w,cy+ry*0.45);
      ctx.bezierCurveTo(x+w*0.8,y+h*0.92, x+w*0.1,y+h, x+w*0.05,cy-ry*0.2);
      break;
    case 'tsurime': // sharp upswept outer corner (fierce eyes)
      ctx.moveTo(x+w*0.05,cy+ry*0.3);
      ctx.bezierCurveTo(x+w*0.12,y+h*0.18, x+w*0.5,y+h*0.05, x+w*0.85,y+h*0.02);
      ctx.bezierCurveTo(x+w*0.95,y, x+w,y-h*0.05, x+w,y);
      ctx.bezierCurveTo(x+w,y+h*0.35, x+w*0.8,y+h*0.75, x+w*0.05,cy+ry*0.3);
      break;
    case 'crescent': // thin curved sliver
      ctx.moveTo(x,cy+ry*0.25);
      ctx.bezierCurveTo(x+w*0.2,cy-ry*0.55, x+w*0.8,cy-ry*0.55, x+w,cy+ry*0.25);
      ctx.bezierCurveTo(x+w*0.8,cy+ry*0.65, x+w*0.2,cy+ry*0.65, x,cy+ry*0.25);
      ctx.closePath(); break;
    case 'leaf': // symmetrical pointed both ends, fully convex sides
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(x+w,y, x+w,y+h, cx,y+h);
      ctx.bezierCurveTo(x,y+h, x,y, cx,y);
      break;
    case 'gothic': // tall narrow almond, elongated vertically
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(x+w*0.9,y+h*0.12, x+w,y+h*0.85, cx,y+h);
      ctx.bezierCurveTo(x,y+h*0.85, x+w*0.1,y+h*0.12, cx,y);
      break;
    default: ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  }
  ctx.stroke();
  ctx.restore();
}

function drawIrisShapeRaw(ctx, shape, x, y, w, h) {
  const cx=x+w/2, cy=y+h/2, rx=w/2, ry=h/2;
  ctx.beginPath();
  switch(shape) {
    // ── Realistic ──
    case 'circle':    ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); break;
    case 'oval-tall': ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); break;
    case 'cat-slit':  // outer oval + vertical slit inside
      ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.moveTo(cx,y+h*0.08);
      ctx.bezierCurveTo(cx+rx*0.22,cy,cx+rx*0.22,cy,cx,y+h*0.92);
      ctx.bezierCurveTo(cx-rx*0.22,cy,cx-rx*0.22,cy,cx,y+h*0.08);
      break;
    case 'dilated':   // large circle with thin outer ring
      ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.moveTo(cx+rx*0.82,cy);
      ctx.ellipse(cx,cy,rx*0.82,ry*0.82,0,0,Math.PI*2);
      break;
    // ── Geometric ──
    case 'diamond': ctx.moveTo(cx,y);ctx.lineTo(x+w,cy);ctx.lineTo(cx,y+h);ctx.lineTo(x,cy);ctx.closePath(); break;
    case 'triangle-down': ctx.moveTo(cx,y+h);ctx.lineTo(x,y);ctx.lineTo(x+w,y);ctx.closePath(); break;
    case 'triangle-up':   ctx.moveTo(cx,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath(); break;
    case 'teardrop-down':
      ctx.moveTo(cx,y+h);
      ctx.bezierCurveTo(cx+rx*0.55,y+h*0.55, cx+rx,y, cx,y);
      ctx.bezierCurveTo(cx-rx,y, cx-rx*0.55,y+h*0.55, cx,y+h); break;
    case 'teardrop-up':
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(cx+rx*0.55,y+h*0.45, cx+rx,y+h, cx,y+h);
      ctx.bezierCurveTo(cx-rx,y+h, cx-rx*0.55,y+h*0.45, cx,y); break;
    case 'leaf':
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(x+w,y, x+w,y+h, cx,y+h);
      ctx.bezierCurveTo(x,y+h, x,y, cx,y); break;
    case 'crescent':
      ctx.arc(cx,cy,Math.min(rx,ry),0,Math.PI*2);
      ctx.moveTo(cx+rx*0.42,cy-ry*0.65);
      ctx.arc(cx+rx*0.38,cy,Math.min(rx,ry)*0.78,Math.PI*1.5,Math.PI*0.5); break;
    case 'star4':
      ctx.moveTo(cx,y); ctx.lineTo(cx+rx*0.32,cy-ry*0.32);
      ctx.lineTo(x+w,cy); ctx.lineTo(cx+rx*0.32,cy+ry*0.32);
      ctx.lineTo(cx,y+h); ctx.lineTo(cx-rx*0.32,cy+ry*0.32);
      ctx.lineTo(x,cy); ctx.lineTo(cx-rx*0.32,cy-ry*0.32); ctx.closePath(); break;
    case 'star3':
      for(let r=0;r<3;r++){const a=r*Math.PI*2/3-Math.PI/2,oa=a+Math.PI/3;if(r===0)ctx.moveTo(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry);else ctx.lineTo(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry);ctx.lineTo(cx+Math.cos(oa)*rx*0.36,cy+Math.sin(oa)*ry*0.36);}ctx.closePath(); break;
    case 'cross':
      ctx.moveTo(cx-rx*0.28,y);ctx.lineTo(cx+rx*0.28,y);ctx.lineTo(cx+rx*0.28,cy-ry*0.28);ctx.lineTo(x+w,cy-ry*0.28);ctx.lineTo(x+w,cy+ry*0.28);ctx.lineTo(cx+rx*0.28,cy+ry*0.28);ctx.lineTo(cx+rx*0.28,y+h);ctx.lineTo(cx-rx*0.28,y+h);ctx.lineTo(cx-rx*0.28,cy+ry*0.28);ctx.lineTo(x,cy+ry*0.28);ctx.lineTo(x,cy-ry*0.28);ctx.lineTo(cx-rx*0.28,cy-ry*0.28);ctx.closePath(); break;
    case 'hex':
      ctx.moveTo(cx,y);ctx.lineTo(x+w,cy-ry*0.5);ctx.lineTo(x+w,cy+ry*0.5);ctx.lineTo(cx,y+h);ctx.lineTo(x,cy+ry*0.5);ctx.lineTo(x,cy-ry*0.5);ctx.closePath(); break;
    // ── Decorative / anime ──
    case 'heart':
      ctx.moveTo(cx,cy+ry*0.5);
      ctx.bezierCurveTo(cx,cy-ry*0.1, x,cy-ry*0.1, x,cy-ry*0.3);
      ctx.bezierCurveTo(x,cy-ry, cx,cy-ry, cx,cy-ry*0.3);
      ctx.bezierCurveTo(cx,cy-ry, x+w,cy-ry, x+w,cy-ry*0.3);
      ctx.bezierCurveTo(x+w,cy-ry*0.1, cx,cy-ry*0.1, cx,cy+ry*0.5);
      break;
    case 'flower': // 4-petal flower
      for(let p=0;p<4;p++){
        const a=p*Math.PI/2, px=cx+Math.cos(a)*rx*0.45, py=cy+Math.sin(a)*ry*0.45;
        ctx.moveTo(px,py); ctx.ellipse(px,py,rx*0.42,ry*0.42,a,0,Math.PI*2);
      }
      ctx.moveTo(cx+rx*0.25,cy); ctx.ellipse(cx,cy,rx*0.25,ry*0.25,0,0,Math.PI*2); break;
    case 'swirl':
      ctx.arc(cx,cy,rx*0.88,-Math.PI*0.5,Math.PI*1.25);
      ctx.arc(cx+rx*0.22,cy,rx*0.52,Math.PI*1.25,-Math.PI*0.35);
      ctx.arc(cx+rx*0.1,cy+ry*0.08,rx*0.22,-Math.PI*0.35,Math.PI*0.85); break;
    case 'target':
      ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.moveTo(cx+rx*0.58,cy); ctx.ellipse(cx,cy,rx*0.58,ry*0.58,0,0,Math.PI*2);
      ctx.moveTo(cx+rx*0.22,cy); ctx.ellipse(cx,cy,rx*0.22,ry*0.22,0,0,Math.PI*2); break;
    case 'sun':
      ctx.ellipse(cx,cy,rx*0.52,ry*0.52,0,0,Math.PI*2);
      for(let r=0;r<8;r++){const a=r*Math.PI/4,ia=a+0.2,oa=a-0.2;ctx.moveTo(cx+Math.cos(ia)*rx*0.58,cy+Math.sin(ia)*ry*0.58);ctx.lineTo(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry);ctx.lineTo(cx+Math.cos(oa)*rx*0.58,cy+Math.sin(oa)*ry*0.58);} break;
    default: ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  }
  ctx.stroke();
}

function drawNoseFront(ctx, shape, x, y, w, h) {
  const cx=x+w/2, cy=y+h/2;
  ctx.beginPath();
  switch(shape) {
    // ── Realistic ──
    case 'nostrils': // two tiny vertical straight lines — like ,, spaced apart
      ctx.moveTo(cx-w*0.22, y+h*0.55); ctx.lineTo(cx-w*0.22, y+h*0.85);
      ctx.moveTo(cx+w*0.22, y+h*0.55); ctx.lineTo(cx+w*0.22, y+h*0.85); break;
    case 'button':  // small rounded triangle with nostril hints
      ctx.moveTo(cx,y+h*0.15);
      ctx.bezierCurveTo(cx+w*0.38,y+h*0.15, cx+w*0.5,y+h*0.5, cx+w*0.48,y+h*0.75);
      ctx.bezierCurveTo(cx+w*0.42,y+h, cx+w*0.05,y+h, cx,y+h);
      ctx.bezierCurveTo(cx-w*0.05,y+h, cx-w*0.42,y+h, cx-w*0.48,y+h*0.75);
      ctx.bezierCurveTo(cx-w*0.5,y+h*0.5, cx-w*0.38,y+h*0.15, cx,y+h*0.15);
      break;
    case 'wide':    // wide low shape, realistic broad nose front
      ctx.moveTo(cx-w*0.5,y+h*0.4);
      ctx.bezierCurveTo(cx-w*0.4,y, cx+w*0.4,y, cx+w*0.5,y+h*0.4);
      ctx.bezierCurveTo(cx+w*0.5,y+h*0.75, cx+w*0.35,y+h, cx,y+h);
      ctx.bezierCurveTo(cx-w*0.35,y+h, cx-w*0.5,y+h*0.75, cx-w*0.5,y+h*0.4);
      break;
    case 'slim':    // narrow tall ridge, refined nose
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(cx+w*0.22,y+h*0.1, cx+w*0.32,y+h*0.5, cx+w*0.35,y+h*0.78);
      ctx.bezierCurveTo(cx+w*0.28,y+h, cx-w*0.28,y+h, cx-w*0.35,y+h*0.78);
      ctx.bezierCurveTo(cx-w*0.32,y+h*0.5, cx-w*0.22,y+h*0.1, cx,y);
      break;
    case 'bulb':    // wide round bulbous tip
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(cx+w*0.18,y, cx+w*0.3,y+h*0.35, cx+w*0.48,y+h*0.5);
      ctx.bezierCurveTo(cx+w*0.65,y+h*0.65, cx+w*0.5,y+h, cx,y+h);
      ctx.bezierCurveTo(cx-w*0.5,y+h, cx-w*0.65,y+h*0.65, cx-w*0.48,y+h*0.5);
      ctx.bezierCurveTo(cx-w*0.3,y+h*0.35, cx-w*0.18,y, cx,y);
      break;
    case 'hawk':    // narrow aquiline — tall and slightly pinched
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(cx+w*0.12,y+h*0.08, cx+w*0.2,y+h*0.55, cx+w*0.22,y+h*0.78);
      ctx.bezierCurveTo(cx+w*0.18,y+h, cx-w*0.18,y+h, cx-w*0.22,y+h*0.78);
      ctx.bezierCurveTo(cx-w*0.2,y+h*0.55, cx-w*0.12,y+h*0.08, cx,y);
      break;
    case 'snub-front': // low wide turned-up feel, rounded base
      ctx.moveTo(cx-w*0.48,y+h*0.5);
      ctx.bezierCurveTo(cx-w*0.4,y+h*0.15, cx+w*0.4,y+h*0.15, cx+w*0.48,y+h*0.5);
      ctx.bezierCurveTo(cx+w*0.5,y+h*0.82, cx+w*0.25,y+h, cx,y+h);
      ctx.bezierCurveTo(cx-w*0.25,y+h, cx-w*0.5,y+h*0.82, cx-w*0.48,y+h*0.5);
      break;
    // ── Stylised ──
    case 'dot':     // single small circle, minimal anime
      ctx.ellipse(cx,cy+h*0.15,Math.min(w,h)*0.28,Math.min(w,h)*0.28,0,0,Math.PI*2); break;
    case 'triangle':
      ctx.moveTo(cx,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath(); break;
    case 'heart':
      ctx.moveTo(cx,cy+h*0.25);
      ctx.bezierCurveTo(cx,cy-h*0.05, x,cy-h*0.05, x,cy-h*0.22);
      ctx.bezierCurveTo(x,cy-h*0.55, cx,cy-h*0.55, cx,cy-h*0.22);
      ctx.bezierCurveTo(cx,cy-h*0.55, x+w,cy-h*0.55, x+w,cy-h*0.22);
      ctx.bezierCurveTo(x+w,cy-h*0.05, cx,cy-h*0.05, cx,cy+h*0.25);
      break;
    case 'water-droplet':
      ctx.moveTo(cx,y);
      ctx.bezierCurveTo(cx+w*0.08,y+h*0.25, cx+w*0.45,y+h*0.45, cx+w*0.5,y+h*0.65);
      ctx.arc(cx, y+h*0.78, w*0.5, 0, Math.PI);
      ctx.bezierCurveTo(cx-w*0.45,y+h*0.45, cx-w*0.08,y+h*0.25, cx,y);
      break;
    default: ctx.ellipse(cx,cy,w*0.4,h*0.4,0,0,Math.PI*2);
  }
  ctx.stroke();
}

function drawNoseSide(ctx, shape, x, y, w, h, tipX, tipY) {
  // tipX (0–1): horizontal projection of the tip (0=flat/back, 1=fully front)
  // tipY (0–1): vertical position of the tip point (0=top of box, 1=bottom; default~0.55 = mid-lower)
  const tipY2 = (tipY !== undefined) ? tipY : 0.55;
  const tipXpx = x + w * tipX;
  const tipYpx = y + h * tipY2;
  // blendY: used for bezier control points that track tip height
  const blend = (a, b, t) => a*(1-t)+b*t;
  ctx.beginPath();
  switch(shape) {
    case 'straight-bridge':
      ctx.moveTo(x, y);
      ctx.lineTo(tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx, y+h, 0.5), blend(tipXpx,x,0.15), y+h, x, y+h);
      ctx.closePath(); break;
    case 'curved-bridge':
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x+w*0.2, y+h*0.15, blend(tipXpx,x,0.3), blend(tipYpx,y,0.4), tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y+h,0.4), blend(tipXpx,x,0.4), y+h, x, y+h);
      ctx.closePath(); break;
    case 'concave':
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x+w*0.05, y+h*0.2, x-w*0.08, blend(tipYpx,y,0.1), blend(tipXpx,x,0.3), blend(tipYpx,y,0.05));
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y,0), tipXpx, blend(tipYpx,y,0.3), tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y+h,0.3), blend(tipXpx,x,0.5), y+h, x, y+h);
      ctx.closePath(); break;
    case 'convex':
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x+w*0.15, y+h*0.08, blend(tipXpx,x,0.1), blend(tipYpx,y,0.6), blend(tipXpx,x,0.18), blend(tipYpx,y,0.45));
      ctx.bezierCurveTo(blend(tipXpx,x,0.28), blend(tipYpx,y,0.3), blend(tipXpx,x,0.35), blend(tipYpx,y,0.2), tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y+h,0.4), blend(tipXpx,x,0.45), y+h, x, y+h);
      ctx.closePath(); break;
    case 'round-tip':
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x+w*0.15, y+h*0.2, blend(tipXpx,x,0.2), blend(tipYpx,y,0.3), blend(tipXpx,x,0.28), blend(tipYpx,y,0.1));
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y,0.1), tipXpx, blend(tipYpx,y,0.1), tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y+h,0.5), blend(tipXpx,x,0.65), y+h, x, y+h);
      ctx.closePath(); break;
    case 'upturned':
      ctx.moveTo(x, y+h*0.15);
      ctx.bezierCurveTo(x+w*0.12, y, blend(tipXpx,x,0.4), blend(tipYpx,y,0.45), blend(tipXpx,x,0.18), blend(tipYpx,y,0.25));
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y,0.1), tipXpx, blend(tipYpx,y,0.35), tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y+h,0.4), blend(tipXpx,x,0.6), y+h, x, y+h);
      ctx.closePath(); break;
    case 'hooked':
      ctx.moveTo(x, y);
      ctx.bezierCurveTo(x+w*0.2, y+h*0.1, blend(tipXpx,x,0.25), blend(tipYpx,y,0.4), tipXpx, tipYpx);
      ctx.bezierCurveTo(tipXpx, blend(tipYpx,y+h,0.3), blend(tipXpx,x,0.15), blend(y+h,tipYpx,0.2), blend(tipXpx,x,0.4), y+h);
      ctx.lineTo(x, y+h); ctx.closePath(); break;
    default:
      ctx.moveTo(x,y); ctx.lineTo(tipXpx,tipYpx); ctx.lineTo(x,y+h); ctx.closePath();
  }
  ctx.stroke();
}

function drawMouthShape(ctx, shape, x, y, w, h) {
  const cx=x+w/2, cy=y+h/2;
  ctx.beginPath();
  switch(shape) {
    case 'neutral':   // flat straight line
      ctx.moveTo(x,cy); ctx.lineTo(x+w,cy); break;
    case 'smile':     // gentle upward curve, closed lips
      ctx.moveTo(x,cy);
      ctx.bezierCurveTo(x+w*0.25,cy, x+w*0.25,y+h*0.15, cx,y+h*0.15);
      ctx.bezierCurveTo(x+w*0.75,y+h*0.15, x+w*0.75,cy, x+w,cy);
      break;
    case 'frown':     // downward curve
      ctx.moveTo(x,cy-h*0.1);
      ctx.bezierCurveTo(x+w*0.25,cy-h*0.1, x+w*0.25,y+h*0.85, cx,y+h*0.85);
      ctx.bezierCurveTo(x+w*0.75,y+h*0.85, x+w*0.75,cy-h*0.1, x+w,cy-h*0.1);
      break;
    case 'open-neutral': // slight open parting, neutral
      ctx.moveTo(x,cy-h*0.12);
      ctx.bezierCurveTo(cx,cy-h*0.22, cx,cy-h*0.22, x+w,cy-h*0.12);
      ctx.bezierCurveTo(x+w*0.85,cy+h*0.35, x+w*0.15,cy+h*0.35, x,cy-h*0.12);
      break;
    case 'open-smile': // open smiling, teeth gap visible
      ctx.moveTo(x,cy-h*0.08);
      ctx.bezierCurveTo(x+w*0.2,y, cx,y, x+w,cy-h*0.08);
      ctx.bezierCurveTo(x+w*0.8,cy+h*0.5, x+w*0.2,cy+h*0.5, x,cy-h*0.08);
      // teeth line
      ctx.moveTo(x+w*0.05,cy+h*0.05); ctx.lineTo(x+w*0.95,cy+h*0.05);
      break;
    case 'lips-full': // full cupid-bow top lip + full bottom lip
      // top lip
      ctx.moveTo(x+w*0.04,cy);
      ctx.bezierCurveTo(x+w*0.18,cy, x+w*0.32,y+h*0.12, cx,y+h*0.18);
      ctx.bezierCurveTo(x+w*0.68,y+h*0.12, x+w*0.82,cy, x+w*0.96,cy);
      // bottom lip
      ctx.moveTo(x+w*0.04,cy);
      ctx.bezierCurveTo(x+w*0.15,cy+h*0.55, x+w*0.35,y+h, cx,y+h);
      ctx.bezierCurveTo(x+w*0.65,y+h, x+w*0.85,cy+h*0.55, x+w*0.96,cy);
      break;
    case 'lips-thin': // thin pressed lips with cupid bow hint
      ctx.moveTo(x+w*0.04,cy+h*0.12);
      ctx.bezierCurveTo(x+w*0.22,cy+h*0.12, x+w*0.35,cy-h*0.12, cx,cy-h*0.18);
      ctx.bezierCurveTo(x+w*0.65,cy-h*0.12, x+w*0.78,cy+h*0.12, x+w*0.96,cy+h*0.12);
      ctx.bezierCurveTo(x+w*0.78,cy+h*0.35, x+w*0.22,cy+h*0.35, x+w*0.04,cy+h*0.12);
      break;
    case 'cat-mouth': // anime W-shape
      ctx.moveTo(x,cy-h*0.05);
      ctx.bezierCurveTo(x+w*0.18,cy-h*0.05, x+w*0.25,cy+h*0.55, cx,cy+h*0.55);
      ctx.bezierCurveTo(x+w*0.75,cy+h*0.55, x+w*0.82,cy-h*0.05, x+w,cy-h*0.05);
      break;
    case 'o-shape':   // round surprised O
      ctx.ellipse(cx,cy+h*0.08,w*0.3,h*0.42,0,0,Math.PI*2); break;
    case 'smirk':     // one side raised (left side higher)
      ctx.moveTo(x,cy+h*0.1);
      ctx.bezierCurveTo(x+w*0.3,cy+h*0.1, x+w*0.55,cy-h*0.25, x+w,cy-h*0.25);
      break;
    case 'wide-grin': // exaggerated wide arc
      ctx.moveTo(x,cy+h*0.1);
      ctx.bezierCurveTo(x+w*0.2,y, cx,y, x+w*0.8,y);
      ctx.bezierCurveTo(x+w,y, x+w,cy+h*0.1, x+w,cy+h*0.1);
      ctx.bezierCurveTo(x+w*0.7,y+h, x+w*0.3,y+h, x,cy+h*0.1);
      break;
    default:
      ctx.moveTo(x,cy); ctx.bezierCurveTo(x+w*0.25,cy,x+w*0.75,cy+h*0.2,x+w,cy);
  }
  ctx.stroke();
}

function drawBrow(ctx, shape, x, y, w, h, rotation) {
  ctx.save();
  ctx.translate(x+w/2,y+h/2); ctx.rotate(rotation*Math.PI/180); ctx.translate(-w/2,-h/2);
  ctx.beginPath();
  switch(shape) {
    case 'straight': ctx.moveTo(0,h/2);ctx.lineTo(w,h/2); break;
    case 'curved': ctx.moveTo(0,h*0.8);ctx.bezierCurveTo(w*0.3,0,w*0.7,0,w,h*0.8); break;
    case 'flat-oval': {
      // Small squished oval anchored to the inner (nose-side) corner.
      // Left brow: right edge = inner corner. Right brow is drawn via ctx.scale(-1,1) so it mirrors automatically.
      const ow = w * 0.28, oh = h * 0.4;
      ctx.ellipse(w - ow, h/2, ow, oh, 0, 0, Math.PI*2); break;
    }
    default: ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);
  }
  ctx.stroke();
  ctx.restore();
}

// ─── drawFace ─────────────────────────────────────────────────────────────
const FACE_THEME_DARK = {
  bg:         '#161618',
  grid:       'rgba(255,255,255,0.08)',
  box:        'rgba(255,255,255,0.25)',
  headCurve:  'rgba(255,255,255,0.7)',
  hairline:   'rgba(255,80,80,0.7)',
  hairlineTxt:'rgba(255,100,100,0.7)',
  prominent:  'rgba(180,100,255,0.5)',
  prominentTxt:'rgba(180,100,255,0.6)',
  nose:       'rgba(100,200,255,0.85)',
  noseBox:    'rgba(100,200,255,0.2)',
  noseTxt:    'rgba(100,200,255,0.35)',
  noseSideTxt:'rgba(100,200,255,0.45)',
  brow:       'rgba(255,180,60,0.9)',
  browBox:    'rgba(255,180,60,0.3)',
  eye:        'rgba(80,220,120,0.9)',
  eyeBox:     'rgba(80,220,120,0.3)',
  mouth:      'rgba(255,100,160,0.9)',
  mouthBox:   'rgba(255,100,160,0.2)',
  label:      'rgba(255,255,255,0.2)',
  chin:       'rgba(255,220,80,0.9)',
  chinHandle: 'rgba(255,220,80,0.4)',
  iris:       'rgba(80,160,255,0.9)',
};
// Same colors as dark but transparent background
const FACE_THEME_TRANSPARENT = Object.assign({}, FACE_THEME_DARK, { bg: null });
// B&W: transparent bg, boxes = solid black outline, all shape guides = cornflower blue
const FACE_THEME_BW = {
  bg:         null,
  grid:       'rgba(0,0,0,0.08)',
  box:        'rgba(0,0,0,0.5)',
  headCurve:  'rgba(80,120,220,0.85)',
  hairline:   'rgba(80,120,220,0.8)',
  hairlineTxt:'rgba(80,120,220,0.85)',
  prominent:  'rgba(80,120,220,0.6)',
  prominentTxt:'rgba(80,120,220,0.75)',
  nose:       'rgba(80,120,220,0.9)',
  noseBox:    'rgba(0,0,0,0.35)',
  noseTxt:    'rgba(80,120,220,0.6)',
  noseSideTxt:'rgba(80,120,220,0.6)',
  brow:       'rgba(80,120,220,0.9)',
  browBox:    'rgba(0,0,0,0.25)',
  eye:        'rgba(80,120,220,0.9)',
  eyeBox:     'rgba(0,0,0,0.25)',
  mouth:      'rgba(80,120,220,0.9)',
  mouthBox:   'rgba(0,0,0,0.25)',
  label:      'rgba(80,120,220,0.7)',
  chin:       'rgba(80,120,220,0.9)',
  chinHandle: 'rgba(80,120,220,0.4)',
  iris:       'rgba(80,120,220,0.9)',
};

function drawFace(theme) {
  if (!faceCtx) return;
  const T = theme || FACE_THEME_DARK;
  const ctx=faceCtx;
  ctx.clearRect(0,0,fW,fH);
  if (T.bg) { ctx.fillStyle=T.bg; ctx.fillRect(0,0,fW,fH); }

  // Grid
  ctx.strokeStyle=T.grid; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(headX+headW/2,headY);ctx.lineTo(headX+headW/2,headY+headH);ctx.stroke();
  for (let i=1;i<=2;i++){const y=headY+(headH/3)*i;ctx.beginPath();ctx.moveTo(headX,y);ctx.lineTo(headX+headW,y);ctx.stroke();}
  ctx.setLineDash([]);

  // Head box
  ctx.strokeStyle=T.box; ctx.lineWidth=1.5;
  ctx.strokeRect(headX,headY,headW,headH);

  // Head top curve
  const _p1L=chinHandles.find(h=>h.id==='p1-left'), _p1R=chinHandles.find(h=>h.id==='p1-right');
  if (_p1L&&_p1R){
    ctx.strokeStyle=T.headCurve; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(_p1L.x,_p1L.y);
    const cpY=headY-headH*0.15;
    ctx.bezierCurveTo(_p1L.x,cpY,_p1R.x,cpY,_p1R.x,_p1R.y);
    ctx.stroke();
  }

  // Hairline
  ctx.strokeStyle=T.hairline; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(headX,fringeY);ctx.lineTo(headX+headW,fringeY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=T.hairlineTxt; ctx.font=`9px 'Space Mono',monospace`;
  ctx.fillText('Hairline',headX+4,fringeY-3);

  // Prominent % line
  const pct=Math.max(0,Math.min(100,parseFloat(document.getElementById('prominentFace').value)||50))/100;
  const prominentY=headY+headH*(1-pct);
  ctx.strokeStyle=T.prominent; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(headX,prominentY);ctx.lineTo(headX+headW,prominentY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=T.prominentTxt; ctx.font=`9px 'Space Mono',monospace`;
  ctx.fillText(`${Math.round(pct*100)}%`,headX+4,prominentY-3);

  // Neck
  ctx.strokeStyle=T.box; ctx.lineWidth=1.5;
  ctx.strokeRect(neckX,neckY,neckW,neckH);

  // ── Geometry ──
  const slack=headW*(Math.max(0,Math.min(45,parseFloat(document.getElementById('innerSlack').value)||15))/100);
  const innerLeft=headX+slack, innerRight=headX+headW-slack, innerW=innerRight-innerLeft;
  const noseWRatio=parseFloat(document.getElementById('noseWidthRatio').value)||3;
  const noseHRatio=parseFloat(document.getElementById('noseHeightRatio').value)||2;
  const noseBoxW=innerW/noseWRatio;
  const noseBoxX=headX+headW/2-noseBoxW/2;

  // PATCH 1: shape width — shrink drawn shape within the box
  const noseShapeWidthPct=Math.max(20,Math.min(200,parseFloat(document.getElementById('noseShapeWidth').value)||100))/100;
  const noseShapeHeightPct=Math.max(10,Math.min(200,parseFloat(document.getElementById('noseShapeHeight').value)||100))/100;
  const noseW=noseBoxW*noseShapeWidthPct;
  const noseOffsetX=parseFloat(document.getElementById('noseOffsetX').value)||0;
  const noseOffsetY=parseFloat(document.getElementById('noseOffsetY').value)||0;
  const noseX=headX+headW/2-noseW/2+noseOffsetX; // centered within box + offset

  const browW=noseBoxX-innerLeft;
  const browBaseH=browW/4;
  const browThickMult=parseFloat(document.getElementById('browThickness').value)||1;
  const browH=browBaseH*browThickMult;
  const browTopY=prominentY, rBrowX=noseBoxX+noseBoxW;
  const eyeWRatio=parseFloat(document.getElementById('eyeHeightRatio').value)||1;
  const eyeW=browW, eyeH=eyeW*eyeWRatio;
  const eyeTopY=browTopY+browBaseH;
  const noseTopY=eyeTopY, noseH=noseBoxW*noseHRatio;
  const noseShapeH=noseH*noseShapeHeightPct;
  const noseShapeY=noseTopY+noseOffsetY+(noseH-noseShapeH)/2; // keep vertically centred in box

  // ── Nose front ──
  ctx.strokeStyle=T.noseBox; ctx.lineWidth=1;
  ctx.strokeRect(noseBoxX+noseOffsetX,noseTopY+noseOffsetY,noseBoxW,noseH); // faint box
  ctx.strokeStyle=T.nose; ctx.lineWidth=1.5;
  drawNoseFront(ctx,document.getElementById('noseShape').value,noseX,noseShapeY,noseW,noseShapeH);
  ctx.fillStyle=T.noseTxt; ctx.font=`7px 'Space Mono',monospace`;
  ctx.fillText('nose',noseBoxX+2,noseTopY+8);

  // ── Nose side ──
  const sideWRatio=parseFloat(document.getElementById('noseSideWidthRatio').value)||1;
  const sideNoseW=noseBoxW*sideWRatio, sideNoseH=noseH;
  const sideNoseX=neckX+neckW+16, sideNoseY=neckY+(neckH-sideNoseH)/2+50;
  ctx.strokeStyle=T.noseBox; ctx.lineWidth=1;
  ctx.strokeRect(sideNoseX,sideNoseY,sideNoseW,sideNoseH);
  ctx.strokeStyle=T.nose; ctx.lineWidth=1.5;
  const noseTipXPct=(parseFloat(document.getElementById('noseSideTipX').value)||100)/100;
  const noseTipYPct=(parseFloat(document.getElementById('noseSideTipY').value)||55)/100;
  drawNoseSide(ctx,document.getElementById('noseSideShape').value,sideNoseX,sideNoseY,sideNoseW,sideNoseH,noseTipXPct,noseTipYPct);
  ctx.fillStyle=T.noseSideTxt; ctx.font=`7px 'Space Mono',monospace`;
  ctx.fillText('nose side',sideNoseX,sideNoseY-3);

  // ── Eyebrows ──
  const browRot=parseFloat(document.getElementById('browRotation').value)||0;
  const browShapeV=document.getElementById('browShape').value;
  ctx.strokeStyle=T.browBox; ctx.lineWidth=1;
  ctx.strokeRect(innerLeft,browTopY,browW,browBaseH);
  ctx.strokeRect(rBrowX,browTopY,browW,browBaseH);
  ctx.strokeStyle=T.brow; ctx.lineWidth=Math.max(1.5,browH*0.4);
  drawBrow(ctx,browShapeV,innerLeft,browTopY,browW,browBaseH,browRot);
  ctx.save();ctx.translate(rBrowX+browW/2,browTopY+browBaseH/2);ctx.scale(-1,1);ctx.translate(-browW/2,-browBaseH/2);
  ctx.strokeStyle=T.brow; ctx.lineWidth=Math.max(1.5,browH*0.4);
  drawBrow(ctx,browShapeV,0,0,browW,browBaseH,browRot);
  ctx.restore();

  // ── Eyes ──
  const eyeShapeV=document.getElementById('eyeShape').value;
  const eyeFlip=document.getElementById('eyeFlipRight').checked;
  const eyeRot180=document.getElementById('eyeRotate180').checked;
  const eyePtsOn = document.getElementById('eyePointsEnabled').checked && eyeCustomPoints.length >= 3;
  // Store live eye box geometry for drag handles
  _eyeBoxL = { x:innerLeft, y:eyeTopY, w:eyeW, h:eyeH };
  _eyeBoxR = { x:rBrowX,   y:eyeTopY, w:eyeW, h:eyeH };
  ctx.strokeStyle=T.eyeBox; ctx.lineWidth=1;
  ctx.strokeRect(innerLeft,eyeTopY,eyeW,eyeH);
  ctx.strokeRect(rBrowX,eyeTopY,eyeW,eyeH);
  ctx.strokeStyle=T.eye; ctx.lineWidth=1.5;
  // Left eye
  ctx.save();ctx.beginPath();ctx.rect(innerLeft,eyeTopY,eyeW,eyeH);ctx.clip();
  if (eyePtsOn) drawEyeFromPoints(ctx,eyeCustomPoints,innerLeft,eyeTopY,eyeW,eyeH,false,eyeFlip,eyeRot180);
  else drawEyeShape(ctx,eyeShapeV,innerLeft,eyeTopY,eyeW,eyeH,false,eyeRot180);
  ctx.restore();
  // Right eye
  ctx.save();ctx.beginPath();ctx.rect(rBrowX,eyeTopY,eyeW,eyeH);ctx.clip();
  if (eyePtsOn) drawEyeFromPoints(ctx,eyeCustomPoints,rBrowX,eyeTopY,eyeW,eyeH,true,eyeFlip,eyeRot180);
  else drawEyeShape(ctx,eyeShapeV,rBrowX,eyeTopY,eyeW,eyeH,eyeFlip,eyeRot180);
  ctx.restore();
  // Update drag handles to match new geometry (e.g. after Generate)
  if (eyePtsOn) updateEyePointHandlePositions();

  // ── Iris layers — clipped to eye shape path ──
  const irisWRatio=parseFloat(document.getElementById('irisWidthRatio').value)||3;
  const baseIrisW=eyeW/irisWRatio;
  // Left eye iris
  drawIrisLayers(ctx,innerLeft,eyeTopY,eyeW,eyeH,baseIrisW,eyeShapeV,false,false,eyeRot180,eyePtsOn?eyeCustomPoints:null);
  // Right eye iris
  drawIrisLayers(ctx,rBrowX,eyeTopY,eyeW,eyeH,baseIrisW,eyeShapeV,true,eyeFlip,eyeRot180,eyePtsOn?eyeCustomPoints:null);

  // ── Mouth ──
  const lEyeCX=innerLeft+eyeW/2, rEyeCX=rBrowX+eyeW/2;
  const mouthWBase=rEyeCX-lEyeCX, mouthH=mouthWBase/4;
  const mouthWidthPct=(parseFloat(document.getElementById('mouthWidthPct').value)||100)/100;
  const mouthW=mouthWBase*mouthWidthPct;
  const mouthCX=(lEyeCX+rEyeCX)/2;
  const mouthX=mouthCX-mouthW/2;
  const jawSpan=(headY+headH)-prominentY;
  const mouthOffsetY=parseFloat(document.getElementById('mouthOffsetY').value)||0;
  const mouthY=prominentY+jawSpan*2/3-mouthH/2+mouthOffsetY;
  ctx.strokeStyle=T.mouthBox; ctx.lineWidth=1;
  ctx.strokeRect(mouthX,mouthY,mouthW,mouthH);
  ctx.strokeStyle=T.mouth; ctx.lineWidth=1.5;
  drawMouthShape(ctx,document.getElementById('mouthShape').value,mouthX,mouthY,mouthW,mouthH);

  // ── Chin ──
  drawChin(ctx, T);

  // Labels
  ctx.fillStyle=T.label; ctx.font=`9px 'Space Mono',monospace`;
  ctx.fillText('5W',headX+headW/2-8,headY-6);
  ctx.save();ctx.translate(headX-8,headY+headH/2);ctx.rotate(-Math.PI/2);ctx.fillText('6H',-8,0);ctx.restore();
}

function drawChin(ctx, T) {
  if (!T) T = FACE_THEME_DARK;
  if (chinHandles.length===0) return;
  const bottomH=chinHandles.find(h=>h.id==='bottom');
  const p1L=chinHandles.find(h=>h.id==='p1-left'), p1R=chinHandles.find(h=>h.id==='p1-right');
  if (!bottomH||!p1L||!p1R) return;
  const leftDrag=chinHandles.filter(h=>!h.anchor&&h.id.includes('left')&&h.id!=='p1-left').sort((a,b)=>a.y-b.y);
  const rightDrag=chinHandles.filter(h=>!h.anchor&&h.id.includes('right')&&h.id!=='p1-right').sort((a,b)=>a.y-b.y);
  const leftPts=[p1L,...leftDrag,bottomH], rightPts=[p1R,...rightDrag,bottomH];
  const segCount=leftPts.length-1, shapes=[];
  for (let i=0;i<segCount;i++){const sel=document.getElementById(`segShape-${i}`);shapes.push(sel?sel.value:'curved');}
  ctx.strokeStyle=T.chin; ctx.lineWidth=2; ctx.setLineDash([]);
  function drawSide(pts) {
    for (let i=0;i<pts.length-1;i++){
      const A=pts[i],B=pts[i+1],seg=shapes[i]||'curved';
      ctx.beginPath();ctx.moveTo(A.x,A.y);
      if (seg==='straight'){ctx.lineTo(B.x,B.y);}
      else {
        if (pts.length===2){ctx.bezierCurveTo(A.x,A.y+(B.y-A.y)*0.95,B.x,B.y,B.x,B.y);}
        else {
          const P0=pts[Math.max(0,i-1)],P1=A,P2=B,P3=pts[Math.min(pts.length-1,i+2)],t=0.5;
          ctx.bezierCurveTo(P1.x+(P2.x-P0.x)*t/3,P1.y+(P2.y-P0.y)*t/3,P2.x-(P3.x-P1.x)*t/3,P2.y-(P3.y-P1.y)*t/3,P2.x,P2.y);
        }
      }
      ctx.stroke();
    }
  }
  drawSide(leftPts); drawSide(rightPts);
  ctx.fillStyle=T.chinHandle;
  ctx.beginPath();ctx.arc(p1L.x,p1L.y,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(p1R.x,p1R.y,4,0,Math.PI*2);ctx.fill();
}

function renderChinHandles() {
  faceWrap.querySelectorAll('.chin-handle').forEach(h=>h.remove());
  chinHandles.filter(h=>!h.anchor).forEach(h=>{
    const el=document.createElement('div'); el.className='chin-handle';
    el.style.left=h.x+'px'; el.style.top=h.y+'px'; el.dataset.id=h.id;
    faceWrap.appendChild(el);
  });
}
function setupChinDrag() {
  let dragging=null, offsetX=0, offsetY=0;
  function getPos(e) {
    const rect=faceWrap.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return {x:clientX-rect.left,y:clientY-rect.top};
  }
  function onStart(e) {
    const el=e.target.closest('.chin-handle'); if (!el) return;
    e.preventDefault(); dragging=el.dataset.id;
    const pos=getPos(e), h=chinHandles.find(h=>h.id===dragging);
    const isRight=dragging.includes('right');
    if (isRight){const leftId=dragging.replace('right','left');const hLeft=chinHandles.find(h=>h.id===leftId);if(hLeft){offsetX=(headX+headW)-(pos.x-headX)-hLeft.x;}else offsetX=0;}
    else offsetX=pos.x-h.x;
    offsetY=pos.y-h.y;
  }
  function onMove(e) {
    if (!dragging) return; e.preventDefault();
    const pos=getPos(e), isRight=dragging.includes('right');
    const leftId=isRight?dragging.replace('right','left'):dragging;
    const rightId=isRight?dragging:dragging.replace('left','right');
    const hLeft=chinHandles.find(h=>h.id===leftId), hRight=chinHandles.find(h=>h.id===rightId);
    if (!hLeft) return;
    const rawX=pos.x-offsetX, rawY=pos.y-offsetY, centerX=headX+headW/2;
    const canonX=isRight?(headX+headW)-(rawX-headX):rawX;
    const clampedX=Math.max(headX,Math.min(centerX,canonX));
    const clampedY=Math.max(headY+headH*0.4,Math.min(headY+headH,rawY));
    hLeft.x=clampedX; hLeft.y=clampedY;
    if (hRight){hRight.x=(headX+headW)-(clampedX-headX);hRight.y=clampedY;}
    faceWrap.querySelectorAll('.chin-handle').forEach(el=>{const hh=chinHandles.find(h=>h.id===el.dataset.id);if(hh){el.style.left=hh.x+'px';el.style.top=hh.y+'px';}});
    drawFace();
  }
  function onEnd(){dragging=null;}
  faceWrap.addEventListener('mousedown',onStart);
  faceWrap.addEventListener('touchstart',onStart,{passive:false});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',onEnd);
  window.addEventListener('touchend',onEnd);
}
function downloadFace() {
  if (!faceCanvas) return;
  const link=document.createElement('a'); link.download=`${getFaceFilename()}.jpg`;
  const off=document.createElement('canvas'); off.width=faceCanvas.width; off.height=faceCanvas.height;
  off.getContext('2d').drawImage(faceCanvas,0,0);
  link.href=off.toDataURL('image/jpeg',0.95); link.click();
}

function downloadFacePng(bw) {
  if (!faceCanvas) return;
  const btnId = bw ? 'faceBwBtn' : 'facePngBtn';
  const btn = document.getElementById(btnId);
  const origText = btn ? btn.textContent : ''; if(btn){btn.textContent='Generating…';btn.disabled=true;}

  const off = document.createElement('canvas');
  off.width = faceCanvas.width; off.height = faceCanvas.height;
  const octx = off.getContext('2d');
  octx.scale(DPR, DPR);

  // Swap context, draw with chosen theme, swap back
  const savedCtx = faceCtx; faceCtx = octx;
  drawFace(bw ? FACE_THEME_BW : FACE_THEME_TRANSPARENT);
  faceCtx = savedCtx;

  const link = document.createElement('a');
  link.download = bw ? `${getFaceFilename()} BW.png` : `${getFaceFilename()}.png`;
  link.href = off.toDataURL('image/png'); link.click();
  if(btn){btn.textContent=origText;btn.disabled=false;}
}

// ═══════════════════════════════════════
// FACE SECTION NAV
// ═══════════════════════════════════════
function faceNavTo(id) {
  const el = document.getElementById(id); if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setFaceNavActive(id);
}
function setFaceNavActive(id) {
  const nav = document.getElementById('faceSecNav'); if (!nav) return;
  nav.querySelectorAll('.face-nav-btn').forEach(btn => {
    const target = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    btn.classList.toggle('active', target === id);
  });
  // Scroll the active nav button into view within the nav bar
  const activeBtn = nav.querySelector('.face-nav-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}
// Highlight nav button as user scrolls through sections
function initFaceNavObserver() {
  const sections = ['sec-head','sec-nose','sec-brows','sec-eyes','sec-iris','sec-mouth','sec-preview'];
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) setFaceNavActive(entry.target.id);
    });
  }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });
  sections.forEach(id => { const el=document.getElementById(id); if(el) observer.observe(el); });
}

// FACE EXCEL EXPORT / IMPORT
// ═══════════════════════════════════════
function exportFaceExcel() {
  if (!faceInited){alert('Open the Face tab first!');return;}
  const chinPts=parseInt(document.getElementById('chinPoints').value)||2;
  const segShapes=[];
  for(let i=0;i<chinPts;i++){const sel=document.getElementById(`segShape-${i}`);segShapes.push(sel?sel.value:'curved');}
  const draggableLeft=chinHandles.filter(h=>!h.anchor&&h.id.endsWith('-left')).sort((a,b)=>a.y-b.y);
  const baseHeaders=['Prominent Face %','Chin Points','Inner Slack %','Nose Width Ratio','Nose Height Ratio','Nose Shape Width %','Nose Shape Height %','Nose Offset X','Nose Offset Y','Nose Shape','Nose Side Width Ratio','Nose Side Tip %','Nose Side Tip Y %','Nose Side Shape','Brow Shape','Brow Rotation','Brow Thickness','Eye Shape','Eye Height Ratio','Eye Flip Right','Eye Rotate 180','Eye Pts Enabled','Eye Pt Count','Eye Curve Mode','Iris Width Ratio','Mouth Shape','Mouth Offset Y','Mouth Width %'];
  const segLabels=['Anchor→P1','P1→P2','P2→P3','P3→Bottom'];
  const segHeaders=segLabels.slice(0,chinPts).map(l=>`Seg [${l}] Shape`);
  const handleHeaders=[], handleValues=[], pointLabels=['P2','P3','P4'];
  draggableLeft.forEach((h,i)=>{const lbl=pointLabels[i]||`PT${i+2}`;handleHeaders.push(`${lbl} X (0–1 of head W)`,`${lbl} Y (0–1 of head H)`);handleValues.push(+((h.x-headX)/headW).toFixed(4),+((h.y-headY)/headH).toFixed(4));});
  // Eye custom points — up to 20 slots
  const EYE_PT_MAX=20;
  const eyePtHeaders=[], eyePtValues=[];
  for(let i=0;i<EYE_PT_MAX;i++){eyePtHeaders.push(`Eye Pt${i+1} NX`,`Eye Pt${i+1} NY`); const p=eyeCustomPoints[i]; eyePtValues.push(p?+p.nx.toFixed(5):'', p?+p.ny.toFixed(5):'');}
  // Iris layers — up to 5
  const IRIS_MAX=5;
  const irisHeaders=[], irisValues=[];
  for(let i=0;i<IRIS_MAX;i++){
    irisHeaders.push(`Iris${i+1} Shape`,`Iris${i+1} Size W`,`Iris${i+1} Size H`,`Iris${i+1} Pos X`,`Iris${i+1} Pos Y`,`Iris${i+1} Rotate180`,`Iris${i+1} FlipRight`);
    const l=irisLayers[i];
    irisValues.push(l?l.shape:'', l?l.sizeW:'', l?l.sizeH:'', l?l.posX:'', l?l.posY:'', l?(l.rotate180?1:0):'', l?(l.flipRight?1:0):'');
  }
  const headers=[...baseHeaders,...segHeaders,...handleHeaders,...eyePtHeaders,...irisHeaders];
  const row=[
    parseFloat(document.getElementById('prominentFace').value)||50,chinPts,
    parseFloat(document.getElementById('innerSlack').value)||15,
    parseFloat(document.getElementById('noseWidthRatio').value)||3,parseFloat(document.getElementById('noseHeightRatio').value)||2,
    parseFloat(document.getElementById('noseShapeWidth').value)||100,
    parseFloat(document.getElementById('noseShapeHeight').value)||100,
    parseFloat(document.getElementById('noseOffsetX').value)||0,
    parseFloat(document.getElementById('noseOffsetY').value)||0,
    document.getElementById('noseShape').value,parseFloat(document.getElementById('noseSideWidthRatio').value)||1,
    parseFloat(document.getElementById('noseSideTipX').value)||100,
    parseFloat(document.getElementById('noseSideTipY').value)||55,
    document.getElementById('noseSideShape').value,document.getElementById('browShape').value,
    parseFloat(document.getElementById('browRotation').value)||0,parseFloat(document.getElementById('browThickness').value)||1,
    document.getElementById('eyeShape').value,parseFloat(document.getElementById('eyeHeightRatio').value)||1,
    document.getElementById('eyeFlipRight').checked?1:0,
    document.getElementById('eyeRotate180').checked?1:0,
    document.getElementById('eyePointsEnabled').checked?1:0,
    parseInt(document.getElementById('eyePointCount').value)||8,
    document.getElementById('eyeCurveMode').value,
    parseFloat(document.getElementById('irisWidthRatio').value)||3,
    document.getElementById('mouthShape').value,parseFloat(document.getElementById('mouthOffsetY').value)||0,
    parseFloat(document.getElementById('mouthWidthPct').value)||100,
    ...segShapes,...handleValues,...eyePtValues,...irisValues,
  ];
  const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet([headers,row]);
  ws['!cols']=headers.map(h=>({wch:Math.max(h.length+4,20)}));
  XLSX.utils.book_append_sheet(wb,ws,'Face Data');
  XLSX.writeFile(wb,`${getFaceFilename()}.xlsx`);
}
function importFaceExcel(event) {
  const file=event.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const wb=XLSX.read(e.target.result,{type:'array'}),ws=wb.Sheets['Face Data'];
      if (!ws){alert('Could not find "Face Data" sheet.');return;}
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      if (rows.length<2){alert('No data found.');return;}
      const headers=rows[0].map(h=>String(h).trim()),data=rows[1];
      const get=n=>{const i=headers.indexOf(n);return i>=0?data[i]:undefined;};
      const getNum=(n,fb)=>{const v=parseFloat(get(n));return isNaN(v)?fb:v;};
      const getStr=(n,fb)=>{const v=get(n);return(v!==undefined&&v!==null&&v!=='')?String(v):fb;};
      document.getElementById('prominentFace').value=getNum('Prominent Face %',50);
      document.getElementById('innerSlack').value=getNum('Inner Slack %',15);
      document.getElementById('noseWidthRatio').value=getNum('Nose Width Ratio',3);
      document.getElementById('noseHeightRatio').value=getNum('Nose Height Ratio',2);
      document.getElementById('noseShapeWidth').value=getNum('Nose Shape Width %',100);
      document.getElementById('noseShapeHeight').value=getNum('Nose Shape Height %',100);
      document.getElementById('noseSideWidthRatio').value=getNum('Nose Side Width Ratio',1);
      document.getElementById('noseOffsetX').value=getNum('Nose Offset X',0);
      document.getElementById('noseOffsetY').value=getNum('Nose Offset Y',0);
      document.getElementById('noseSideTipY').value=getNum('Nose Side Tip Y %',55);
      document.getElementById('mouthWidthPct').value=getNum('Mouth Width %',100);
      document.getElementById('browRotation').value=getNum('Brow Rotation',0);
      document.getElementById('browThickness').value=getNum('Brow Thickness',1);
      document.getElementById('eyeHeightRatio').value=getNum('Eye Height Ratio',1);
      document.getElementById('irisWidthRatio').value=getNum('Iris Width Ratio',3);
      // Eye flags
      const eyeFlipVal=getNum('Eye Flip Right',0); document.getElementById('eyeFlipRight').checked=eyeFlipVal===1;
      const eyeRotVal=getNum('Eye Rotate 180',0);  document.getElementById('eyeRotate180').checked=eyeRotVal===1;
      // Eye curve mode
      const curveMode=getStr('Eye Curve Mode','smooth');
      const curveSel=document.getElementById('eyeCurveMode'); if(curveSel){const o=[...curveSel.options].find(o=>o.value===curveMode);if(o)curveSel.value=curveMode;}
      // Eye point count
      const ptCount=getNum('Eye Pt Count',8); document.getElementById('eyePointCount').value=Math.max(3,Math.min(20,ptCount));
      // safeSetShape: validates value against known picker values, falls back to default
      function safeSetShape(pickerId,hiddenId,val,def){
        const hidden=document.getElementById(hiddenId);if(!hidden)return;
        const container=document.getElementById(pickerId);
        const knownValues=container?[...container.querySelectorAll('.shape-tile')].map(t=>t.dataset.value):[];
        hidden.value=(knownValues.length===0||knownValues.includes(val))?val:def;
        if(container){container.querySelectorAll('.shape-tile').forEach(t=>t.classList.toggle('selected',t.dataset.value===hidden.value));}
      }
      function safeSet(id,val){const sel=document.getElementById(id);if(!sel)return;const opt=[...sel.options].find(o=>o.value===val);if(opt)sel.value=val;}
      safeSetShape('noseShapePicker','noseShape',getStr('Nose Shape',''),'nostrils');
      safeSetShape('noseSideShapePicker','noseSideShape',getStr('Nose Side Shape',''),'straight-bridge');
      safeSetShape('eyeShapePicker','eyeShape',getStr('Eye Shape',''),'almond');
      safeSetShape('mouthShapePicker','mouthShape',getStr('Mouth Shape',''),'smile');
      safeSet('browShape',getStr('Brow Shape','straight'));
      document.getElementById('noseSideTipX').value=getNum('Nose Side Tip %',100);
      document.getElementById('mouthOffsetY').value=getNum('Mouth Offset Y',0);
      const chinPts=Math.max(1,Math.min(4,getNum('Chin Points',2)));
      document.getElementById('chinPoints').value=chinPts;
      if (!faceInited) initFace();
      chinHandles=buildDefaultChinHandles(chinPts); buildSegmentSelectors(chinPts);
      const segLabels=['Anchor→P1','P1→P2','P2→P3','P3→Bottom'];
      for(let i=0;i<chinPts;i++){const shape=getStr(`Seg [${segLabels[i]}] Shape`,'curved');const sel=document.getElementById(`segShape-${i}`);if(sel){const opt=[...sel.options].find(o=>o.value===shape);if(opt)sel.value=shape;}}
      const pointLabels=['P2','P3','P4'];
      chinHandles.filter(h=>!h.anchor&&h.id.endsWith('-left')).sort((a,b)=>a.y-b.y).forEach((hLeft,i)=>{
        const lbl=pointLabels[i]||`PT${i+2}`;
        const normX=parseFloat(get(`${lbl} X (0–1 of head W)`)),normY=parseFloat(get(`${lbl} Y (0–1 of head H)`));
        if(isNaN(normX)||isNaN(normY))return;
        const rightId=hLeft.id.replace('-left','-right'),hRight=chinHandles.find(h=>h.id===rightId);
        hLeft.x=headX+normX*headW; hLeft.y=headY+normY*headH;
        if(hRight){hRight.x=(headX+headW)-normX*headW;hRight.y=headY+normY*headH;}
      });
      drawFace(); renderChinHandles();
      // Restore eye custom points
      const eyePtsEnabledVal=getNum('Eye Pts Enabled',0);
      const EYE_PT_MAX=20;
      const loadedPts=[];
      for(let i=0;i<EYE_PT_MAX;i++){
        const nx=parseFloat(get(`Eye Pt${i+1} NX`)), ny=parseFloat(get(`Eye Pt${i+1} NY`));
        if(!isNaN(nx)&&!isNaN(ny)) loadedPts.push({nx,ny});
      }
      const eyePtsCb=document.getElementById('eyePointsEnabled');
      const eyePtControls=document.getElementById('eyePointControls');
      if(eyePtsEnabledVal===1&&loadedPts.length>=3){
        eyeCustomPoints=loadedPts;
        eyePtsCb.checked=true; eyePtControls.style.display='';
        renderEyePointHandles();
      } else {
        eyeCustomPoints=[]; eyePtsCb.checked=false; eyePtControls.style.display='none';
        removeEyePointHandles();
      }
      // Restore iris layers
      const IRIS_MAX=5;
      irisLayers=[]; irisLayerCounter=0;
      document.getElementById('irisLayersContainer').innerHTML='';
      for(let i=0;i<IRIS_MAX;i++){
        const shape=getStr(`Iris${i+1} Shape`,'');
        if(!shape) break; // no more layers saved
        const layer=defaultIrisLayer();
        layer.shape=shape;
        layer.sizeW=getNum(`Iris${i+1} Size W`,100);
        layer.sizeH=getNum(`Iris${i+1} Size H`,100);
        layer.posX=getNum(`Iris${i+1} Pos X`,50);
        layer.posY=getNum(`Iris${i+1} Pos Y`,50);
        layer.rotate180=getNum(`Iris${i+1} Rotate180`,0)===1;
        layer.flipRight=getNum(`Iris${i+1} FlipRight`,0)===1;
        irisLayers.push(layer);
        renderIrisLayerUI(layer);
      }
      drawFace();
      document.getElementById('facePreset').value='';
    } catch(err){alert('Failed: '+err.message);}
    event.target.value='';
  };
  reader.readAsArrayBuffer(file);
}
